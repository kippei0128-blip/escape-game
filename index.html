<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>脱出ゲーム進化版</title>

<style>
body { margin:0; background:#89a; font-family:sans-serif; }

#game {
  width:900px; height:500px;
  margin:20px auto;
  background:#cde;
  position:relative;
  border:5px solid #333;
}

/* 家具（イラスト風） */
.furniture {
  position:absolute;
  width:80px; height:80px;
  background:#fff;
  border:2px solid #333;
  text-align:center;
  font-size:40px;
  line-height:80px;
}

/* ドア */
.door {
  position:absolute;
  right:50px;
  top:150px;
  width:100px; height:150px;
  background:brown;
  border:3px solid #000;
}

/* インベントリ */
#inventory {
  position:fixed;
  bottom:0;
  width:100%;
  background:#222;
  padding:10px;
}

.item {
  display:inline-block;
  margin:5px;
  padding:10px;
  background:#555;
  color:#fff;
  cursor:grab;
}

/* セリフ */
#textBox {
  position:fixed;
  bottom:80px;
  width:100%;
  background:#000;
  color:#fff;
  padding:10px;
  text-align:center;
}
</style>

</head>
<body>

<div id="game"></div>
<div id="textBox"></div>
<div id="inventory"></div>

<script>

let inventory = ["キッチンの鍵"];
let dragging = null;

/* セリフ表示 */
function say(text){
  document.getElementById("textBox").innerText = text;
}

/* 初期セリフ */
let intro = [
"ここはどこだ、、、",
"どうやら閉じ込められてしまったようだ、、、",
"どうにかして脱出しよう！"
];

let i=0;
function nextIntro(){
  if(i < intro.length){
    say(intro[i]);
    i++;
    setTimeout(nextIntro,1500);
  }
}
nextIntro();

/* 部屋ロード */
function loadRoom(){
  const game = document.getElementById("game");
  game.innerHTML = "";

  // 家具
  createFurniture("🛏",100,200,null);
  createFurniture("📦",300,200,"寝室の鍵");
  createFurniture("📚",500,200,null);

  // ドア
  const door = document.createElement("div");
  door.className = "door";
  door.ondragover = e => e.preventDefault();
  door.ondrop = ()=>{
    if(dragging === "寝室の鍵"){
      say("鍵が開いた！");
      alert("クリア！");
    } else {
      say("違う鍵みたいだ…");
    }
  };
  game.appendChild(door);
}

/* 家具作成 */
function createFurniture(icon,x,y,item){
  const div = document.createElement("div");
  div.className = "furniture";
  div.innerText = icon;
  div.style.left = x+"px";
  div.style.top = y+"px";

  div.onclick = ()=>{
    if(item){
      inventory.push(item);
      updateInventory();
      say(item+"を手に入れた！");
      item=null;
    } else {
      say("特に何もない");
    }
  };

  document.getElementById("game").appendChild(div);
}

/* インベントリ */
function updateInventory(){
  const inv = document.getElementById("inventory");
  inv.innerHTML = "";

  inventory.forEach(item=>{
    let div = document.createElement("div");
    div.className = "item";
    div.innerText = item;
    div.draggable = true;

    div.ondragstart = ()=>{
      dragging = item;
      say(item+"を持った");
    };

    inv.appendChild(div);
  });
}

updateInventory();
loadRoom();

</script>

</body>
</html>
